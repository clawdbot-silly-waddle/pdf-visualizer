<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Render Visualizer</title>
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body>
  <!-- Drop zone (initial state) -->
  <div id="drop-zone">
    <div class="drop-inner">
      <svg class="drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m6.75 12l-3-3m0 0l-3 3m3-3v6m-1.5-15H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
      </svg>
      <h1>PDF Render Visualizer</h1>
      <p>Drop a PDF here or click to open</p>
      <label class="drop-btn" for="file-input">Choose File</label>
      <input type="file" id="file-input" accept="application/pdf" hidden />
    </div>
  </div>

  <!-- Main app (hidden until PDF loaded) -->
  <div id="app-main" style="display: none">
    <!-- Page thumbnails sidebar -->
    <aside id="thumb-sidebar">
      <div class="sidebar-header">Pages</div>
      <div id="thumb-container"></div>
    </aside>

    <!-- Main viewport -->
    <main id="viewport">
      <div id="canvas-wrapper">
        <canvas id="render-canvas"></canvas>
      </div>

      <!-- Controls bar -->
      <div id="controls">
        <div id="op-display"></div>

        <div id="seeker-row">
          <input type="range" id="seeker-slider" min="0" max="0" value="0" step="1" />
          <span id="seeker-label">0 / 0</span>
        </div>

        <div id="btn-row">
          <div class="btn-group">
            <button id="step-back" title="Step Back (←)"><svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><rect x="4" y="5" width="3" height="14"/><polygon points="20,5 20,19 8,12"/></svg></button>
            <button id="play-btn" title="Play (Space)"><svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><polygon points="6,4 20,12 6,20"/></svg></button>
            <button id="step-fwd" title="Step Forward (→)"><svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><polygon points="4,5 4,19 16,12"/><rect x="17" y="5" width="3" height="14"/></svg></button>
          </div>

          <select id="speed-select" title="Playback Speed">
            <option value="500">0.5×</option>
            <option value="250">1×</option>
            <option value="150" selected>2×</option>
            <option value="80">4×</option>
            <option value="30">10×</option>
          </select>

          <div id="page-nav-mobile">
            <button id="page-prev" title="Previous Page">◀</button>
            <span id="page-counter"></span>
            <button id="page-next" title="Next Page">▶</button>
          </div>

          <label class="new-file-btn" for="file-input-2">Open File</label>
          <input type="file" id="file-input-2" accept="application/pdf" hidden />
        </div>
      </div>
    </main>

    <!-- Operator list panel -->
    <aside id="op-panel">
      <div class="sidebar-header">Instructions</div>
      <div id="op-list"></div>
    </aside>
  </div>

  <!-- Loading overlay -->
  <div id="loading-overlay" style="display: none">
    <div class="spinner"></div>
    <span>Loading…</span>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
